# https://docs.astral.sh/ruff/configuration/
line-length = 88
target-version = "py311"

[lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "I",   # isort
  "UP",  # pyupgrade
]

[lint.per-file-ignores]
# `sys.path` must be adjusted before first-party imports.
"scripts/train.py" = ["E402"]
"scripts/pretokenize.py" = ["E402"]
"scripts/evaluate.py" = ["E402"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
